<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер КБЖУ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Главный экран -->
        <div class="main-screen" id="mainScreen">
            <!-- Дневные КБЖУ -->
            <div class="day_nutri_amount" id="dayNutriAmount">
                <div class="day_nutri_amount_core">
                    <div class="nutri_counter">
                        <div class="proteins_counter">
                            <div class="protein_label">Б</div>
                            <div class="protein_space">
                                <div class="amount" id="proteinAmount">0</div>
                                <div class="goal">145 г</div>
                            </div>
                        </div>
                        <div class="fats_counter">
                            <div class="fat_label">Ж</div>
                            <div class="fat_space">
                                <div class="amount" id="fatAmount">0</div>
                                <div class="goal">65 г</div>
                            </div>
                        </div>
                        <div class="carbs_counter">
                            <div class="carb_label">У</div>
                            <div class="carb_space">
                                <div class="amount" id="carbAmount">0</div>
                                <div class="goal">408 г</div>
                            </div>
                        </div>
                    </div>
                    <div class="separator"></div>
                    <div class="cals_counter">
                        <div class="cal_label">КАЛ</div>
                        <div class="cals_space">
                            <div class="amount" id="calAmount">0</div>
                            <div class="goal">2 800</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Список записей -->
            <div class="meal_notes" id="mealNotes">
                <div class="title">Записи</div>
                <div class="meal_notes_list" id="mealNotesList">
                    <!-- Записи будут добавляться динамически -->
                </div>
            </div>

            <!-- Кнопка добавления записи -->
            <div class="new_note_button" id="newNoteButton">
                <div class="plus">+</div>
            </div>
        </div>

        <!-- Модальное окно добавления записи -->
        <div class="new_note_drawer" id="newNoteDrawer">
            <div class="drawer_handle"></div>
            <div class="drawer_content">
                <!-- Ввод КБЖУ -->
                <div class="nutri_values_entry" id="nutriValuesEntry">
                    <div class="nutri_notes_entry_core">
                        <div class="nutri_counter">
                            <div class="proteins_counter">
                                <div class="protein_label">Б</div>
                                <div class="protein_space">
                                    <input type="number" class="amount_input" id="proteinInput" value="0" min="0">
                                    <div class="left" id="proteinLeft">-145 г</div>
                                </div>
                            </div>
                            <div class="fats_counter">
                                <div class="fat_label">Ж</div>
                                <div class="fat_space">
                                    <input type="number" class="amount_input" id="fatInput" value="0" min="0">
                                    <div class="left" id="fatLeft">-65 г</div>
                                </div>
                            </div>
                            <div class="carbs_counter">
                                <div class="carb_label">У</div>
                                <div class="carb_space">
                                    <input type="number" class="amount_input" id="carbInput" value="0" min="0">
                                    <div class="left" id="carbLeft">-408 г</div>
                                </div>
                            </div>
                        </div>
                        <div class="separator"></div>
                        <div class="cals_counter">
                            <div class="cal_label">КАЛ</div>
                            <div class="cals_space">
                                <div class="amount" id="calInputDisplay">0</div>
                                <div class="left" id="calLeft">-2 800</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Описание -->
                <div class="nutri_notes_description_set">
                    <textarea class="description_text" id="descriptionInput" placeholder="Описание еды"></textarea>
                </div>

                <!-- Кнопка добавления -->
                <div class="button_sheet">
                    <button class="button_primary" id="addNoteButton">Добавить запись</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Контекстное меню -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" id="editMenuItem">Редактировать</div>
        <div class="context-menu-item delete" id="deleteMenuItem">Удалить</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
