<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекер КБЖУ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Главный экран -->
        <div class="main-screen" id="mainScreen">
            <!-- Список дней -->
            <div class="days_timeline" id="daysTimeline"></div>

            <div class="days_timeline_wrapper">
                <div class="arrow_button left" id="arrowLeft">⭠</div>
                <div class="days_timeline" id="daysTimeline"></div>
                <div class="arrow_button right" id="arrowRight">⭢</div>
              </div>
            <!-- Дневные КБЖУ -->
            <div class="day_nutri_amount" id="dayNutriAmount">
                <div class="day_nutri_amount_core">
                    <div class="nutri_counter">
                        <div class="proteins_counter">
                            <div class="protein_label">Б</div>
                            <div class="protein_space">
                                <div class="amount" id="proteinAmount">0</div>
                                <div class="goal">145 г</div>
                            </div>
                        </div>
                        <div class="fats_counter">
                            <div class="fat_label">Ж</div>
                            <div class="fat_space">
                                <div class="amount" id="fatAmount">0</div>
                                <div class="goal">65 г</div>
                            </div>
                        </div>
                        <div class="carbs_counter">
                            <div class="carb_label">У</div>
                            <div class="carb_space">
                                <div class="amount" id="carbAmount">0</div>
                                <div class="goal">408 г</div>
                            </div>
                        </div>
                    </div>
                    <div class="separator"></div>
                    <div class="cals_counter">
                        <div class="cal_label">КАЛ</div>
                        <div class="cals_space">
                            <div class="amount" id="calAmount">0</div>
                            <div class="goal">2 800</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Список записей -->
            <div class="meal_notes" id="mealNotes">
                <div class="title">Записи</div>
                <div class="meal_notes_list" id="mealNotesList">
                    <!-- Записи будут добавляться динамически -->
                </div>
            </div>

            <!-- Кнопка добавления записи -->
            <a href="add.html" class="new_note_button" id="newNoteButton">
                <div class="plus">+</div>
              </a>

    <!-- Контекстное меню -->
    <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" id="editMenuItem">Редактировать</div>
        <div class="context-menu-item delete" id="deleteMenuItem">Удалить</div>
    </div>

    <script src="script.js"></script>

</body>
</html>
